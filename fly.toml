app = "tingee-payment-app"
primary_region = "sin"

[build]

[deploy]
  # Runs once per deploy (not per machine) before traffic shifts — safe for fly scale count 2
  release_command = "npx prisma migrate deploy"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
