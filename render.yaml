services:
  - type: web
    name: tingee-payment-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: starter
    healthCheckPath: /api/health
    preDeployCommand: npx prisma migrate deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SCOPES
        value: read_orders,write_orders
      - key: SHOPIFY_APP_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: TINGEE_SDK_TIMEOUT_MS
        value: "4000"
      - key: SENTRY_DSN
        sync: false
